name: MLOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/pdm-serving

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: |
          ruff check src/ tests/
          black --check src/ tests/
      - name: Run unit tests
        run: |
          pytest tests/ --junitxml=test-results.xml --cov=src --cov-report=xml --cov-report=term
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  train-and-validate:
    name: Train & Validate
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate data
        run: python -m src.data.generate_data --output data/sensors.csv --samples 50000
      - name: Train model
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
        run: python -m src.training.train --config configs/training.yaml
      - name: Validate model
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
        run: |
          RUN_ID=$(python -c "import mlflow; mlflow.set_tracking_uri('file:./mlruns'); c=mlflow.MlflowClient(); exp=c.get_experiment_by_name('predictive_maintenance'); runs=c.search_runs([exp.experiment_id], order_by=['start_time DESC'], max_results=1); print(runs[0].info.run_id)")
          python scripts/validate_model.py --run-id $RUN_ID

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: train-and-validate
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push serving image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.serving
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
