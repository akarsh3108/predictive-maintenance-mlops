# Horizontal Pod Autoscaler.
# Scales between 3-10 replicas based on CPU utilization.
# In production you'd also add a custom metric (e.g. prometheus-adapter
# scaling on pdm_predictions_total rate) but CPU is a good starting proxy.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pdm-serving-hpa
  namespace: pdm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pdm-serving
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    # Scale up aggressively, scale down cautiously — prevents flapping
    # when load briefly drops (which would otherwise cause cold starts).
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
